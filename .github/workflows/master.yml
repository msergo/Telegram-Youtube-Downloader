name: Release on Commit to Main

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cross
        run: cargo install cross

      - name: Read Rust package version
        id: package_version
        run: |
          VERSION=$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check release tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.package_version.outputs.tag }}"; then
            echo "Release tag ${{ steps.package_version.outputs.tag }} already exists. Bump Cargo.toml before releasing."
            exit 1
          fi

      - name: Build binary
        run: cross build --release --target x86_64-unknown-linux-musl

      - name: Prepare versioned release artifact
        run: cp target/x86_64-unknown-linux-musl/release/yt_dl_service target/x86_64-unknown-linux-musl/release/yt_dl_service-${{ steps.package_version.outputs.version }}-x86_64-unknown-linux-musl

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package_version.outputs.tag }}
          name: yt_dl_service ${{ steps.package_version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: target/x86_64-unknown-linux-musl/release/yt_dl_service-${{ steps.package_version.outputs.version }}-x86_64-unknown-linux-musl
